<!DOCTYPE html>
<html>
<head>
<title>Add Flat</title>

<style>
body{
font-family:Arial;
background:#f5f7fa;
padding:30px;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
background:#2563eb;
color:white;
padding:12px;
border:none;
cursor:pointer;
width:100%;
}
</style>
</head>

<body>

<div class="container">

<h1>Add Flat</h1>

<input type="text" id="title" placeholder="Flat Title">

<input type="text" id="city" placeholder="City">

<input type="number" id="rent" placeholder="Monthly Rent">

<button onclick="addFlat()">
Add Flat
</button>

</div>

<script>

function addFlat(){

let title=document.getElementById("title").value;
let city=document.getElementById("city").value;
let rent=document.getElementById("rent").value;

let flats=JSON.parse(localStorage.getItem("flats")) || [];

flats.push({
title:title,
city:city,
rent:rent
});

localStorage.setItem("flats",JSON.stringify(flats));

alert("Flat Added Successfully");

}

</script>

</body>
</html>
