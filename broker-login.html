<!DOCTYPE html>
<html>
<head>
    <title>Broker Login</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f5f5f5;
            text-align:center;
            padding-top:100px;
        }

        .login-box{
            width:300px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:10px;
        }

        input{
            width:90%;
            padding:10px;
            margin:10px 0;
        }

        button{
            padding:10px 20px;
            cursor:pointer;
        }
    </style>
</head>

<body>

<div class="login-box">

    <h1>Broker Login</h1>

    <input type="email" placeholder="Enter Email">

    <br>

    <input type="password" placeholder="Enter Password">

    <br>

    <button>Login</button>

</div>

</body>
</html>
